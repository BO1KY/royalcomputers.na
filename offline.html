<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; base-uri 'self'; form-action 'self'">
  <title>Offline – Royal Computers Namibia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap"></noscript>
  <link rel="stylesheet" href="css/design-tokens.css">
  <link rel="stylesheet" href="css/royal-theme.css" media="print" onload="this.media='all'">
  <link rel="stylesheet" href="css/animations.css" media="print" onload="this.media='all'">
  <link rel="stylesheet" href="css/mobile.css" media="print" onload="this.media='all'">
  <style>
.page-loader{position:fixed!important;inset:0!important;z-index:99999!important;background:var(--bg-backdrop)!important;display:flex!important;align-items:center!important;justify-content:center!important}
.loader-spinner{width:48px;height:48px;border:4px solid #ddd;border-top-color:#e5383b;border-radius:50%;animation:loaderSpin .8s linear infinite}
@keyframes loaderSpin{to{transform:rotate(360deg)}}
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      text-align: center;
      padding: 24px;
    }
    .offline-main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .box { max-width: 420px; }
    .icon { font-size: 72px; margin-bottom: 24px; display: block; }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 12px; color: var(--text); }
    p { font-size: 16px; color: var(--text-muted); line-height: 1.7; margin-bottom: 28px; }
    .btn {
      display: inline-block;
      background: var(--red);
      color: #fff;
      padding: 13px 32px;
      border-radius: var(--radius-full);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: background var(--transition);
      font-family: 'DM Sans', sans-serif;
    }
    .btn:hover { background: var(--red-dark); }
  </style>
</head>
<body>
  <div class="page-loader" id="pageLoader">
    <div class="loader-spinner"></div>
    <div class="loader-text">Loading…</div>
  </div>
  <div class="offline-main">
  <div class="box">
    <span class="icon">📡</span>
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. Some pages you've visited recently may still be available.</p>
    <button class="btn" onclick="window.location.reload()">Try Again</button>
  </div>
  </div>
<script defer src="js/api-config.js"></script>
<footer class="footer-mini">
  &copy; 2025 Royal Computers Namibia.
  <a href="index.html" style="margin-left:6px;">Back to Home</a>
</footer>
</body>
</html>
