<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reset Password – Royal Computers Namibia</title>
<meta name="description" content="Reset your Royal Computers Namibia account password. Enter your username, verify your email code, and set a new password.">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' http://localhost:3000; img-src 'self' data: https:; base-uri 'self'; form-action 'self'">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap"></noscript>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#f5f3f4;color:#1a1a2e;min-height:100vh;display:flex;flex-direction:column}
.auth-main{flex:1;display:flex;align-items:center;justify-content:center}
.card{background:#fff;border-radius:16px;box-shadow:0 2px 24px rgba(0,0,0,.08);padding:40px;max-width:420px;width:100%;margin:24px;text-align:center}
.card .logo{width:56px;height:56px;object-fit:contain;margin-bottom:12px;border-radius:10px}
.card h1{font-size:20px;font-weight:700;margin-bottom:4px}
.card p{font-size:14px;color:#666;margin-bottom:20px}
.card input{width:100%;padding:12px 16px;border:2px solid #ddd;border-radius:10px;font-size:15px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s;margin-bottom:12px}
.card input:focus{border-color:#e5383b}
.card button{width:100%;padding:13px;background:#e5383b;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .2s}
.card button:hover{background:#a4161a}
.card button:disabled{opacity:.6;cursor:default}
.card .msg{font-size:13px;min-height:24px;margin-top:8px}
.card .back-link{display:inline-block;margin-top:16px;font-size:13px;color:#e5383b;text-decoration:none}
.card .back-link:hover{text-decoration:underline}
.code-input{letter-spacing:6px;font-size:22px!important;font-weight:700;text-align:center}
.steps{display:flex;justify-content:center;gap:8px;margin-bottom:24px}
.step{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;background:#eee;color:#999}
.step.active{background:#e5383b;color:#fff}
.step.done{background:#16a34a;color:#fff}
.spotlight-container-global{position:fixed;inset:0;z-index:-1;overflow:hidden;pointer-events:none}
.spotlight-overlay-global{position:absolute;inset:0;display:flex;justify-content:space-around;align-items:center;opacity:.6}
.spotlight-global{width:300px;height:300px;border-radius:50%;filter:blur(120px)}
.spotlight-left-global{background:rgba(229,56,59,.08)}
.spotlight-mid-global{background:rgba(229,56,59,.05)}
.spotlight-right-global{background:rgba(229,56,59,.03)}
.shader-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;pointer-events:none}
</style>
</head>
<body>
<canvas id="shader-canvas" class="shader-canvas"></canvas>

<div class="spotlight-container-global">
  <div class="spotlight-overlay-global">
    <div class="spotlight-global spotlight-left-global"></div>
    <div class="spotlight-global spotlight-mid-global"></div>
    <div class="spotlight-global spotlight-right-global"></div>
  </div>
</div>

<div class="auth-main">
<div class="card" id="step1">
  <img src="ROYAL PICS/royal logo.webp" alt="Royal Computers Namibia" class="logo" />
  <h1>Reset Password</h1>
  <p>Enter your username to get started.</p>
  <input type="text" id="resetUserInput" placeholder="Your username" autocomplete="username" />
  <button id="step1Btn">Send Reset Code</button>
  <div class="msg" id="step1Msg"></div>
  <a href="admin.html" class="back-link">&larr; Back to login</a>
</div>

<div class="card" id="step2" style="display:none;">
  <img src="ROYAL PICS/royal logo.webp" alt="Royal Computers Namibia" class="logo" />
  <h1>Enter Code</h1>
  <p>Check your email for the 6-digit code.</p>
  <input type="text" id="codeInput" class="code-input" placeholder="000000" maxlength="6" inputmode="numeric" autocomplete="one-time-code" />
  <button id="step2Btn">Verify Code</button>
  <div class="msg" id="step2Msg"></div>
  <a href="#" onclick="resetFlow();return false;" class="back-link">&larr; Start over</a>
</div>

<div class="card" id="step3" style="display:none;">
  <img src="ROYAL PICS/royal logo.webp" alt="Royal Computers Namibia" class="logo" />
  <h1>New Password</h1>
  <p>Choose a new password (at least 6 characters).</p>
  <input type="password" id="newPwInput" placeholder="New password" autocomplete="new-password" />
  <input type="password" id="confirmPwInput" placeholder="Confirm password" autocomplete="new-password" />
  <button id="step3Btn">Set Password</button>
  <div class="msg" id="step3Msg"></div>
  <a href="admin.html" class="back-link">&larr; Go to login</a>
</div>
</div>

<script>
  var currentUser = '';

  function $(id) { return document.getElementById(id); }

  // Step 1: Request reset
  $('step1Btn').addEventListener('click', function() {
    var u = $('resetUserInput').value.trim();
    if (!u) { $('step1Msg').textContent = 'Enter your username.'; $('step1Msg').style.color = '#d32f2f'; return; }
    var btn = this;
    btn.disabled = true;
    btn.textContent = 'Sending...';
    $('step1Msg').textContent = '';
    fetch('/api/admin/request-password-reset', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: u })
    }).then(function(r) { return r.json(); }).then(function(d) {
      if (d.success) {
        currentUser = u;
        $('step1').style.display = 'none';
        $('step2').style.display = 'block';
        $('step2Msg').textContent = '';
      } else {
        $('step1Msg').textContent = d.error || 'Request failed.';
        $('step1Msg').style.color = '#d32f2f';
        btn.disabled = false;
        btn.textContent = 'Send Reset Code';
      }
    }).catch(function() {
      $('step1Msg').textContent = 'Server error. Try again.';
      $('step1Msg').style.color = '#d32f2f';
      btn.disabled = false;
      btn.textContent = 'Send Reset Code';
    });
  });

  $('resetUserInput').addEventListener('keydown', function(e) { if (e.key === 'Enter') $('step1Btn').click(); });

  // Step 2: Verify code
  $('step2Btn').addEventListener('click', function() {
    var code = $('codeInput').value.trim();
    if (!code || code.length !== 6) { $('step2Msg').textContent = 'Enter the 6-digit code from your email.'; $('step2Msg').style.color = '#d32f2f'; return; }
    var btn = this;
    btn.disabled = true;
    btn.textContent = 'Verifying...';
    $('step2Msg').textContent = '';
    fetch('/api/verify-reset-code', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: currentUser, code: code })
    }).then(function(r) {
      if (!r.ok) return r.json().then(function(d) { throw new Error(d.error || 'Invalid code'); });
      return r.json();
    }).then(function(d) {
      if (d.success) {
        $('step2').style.display = 'none';
        $('step3').style.display = 'block';
        $('step3Msg').textContent = '';
      }
    }).catch(function(err) {
      $('step2Msg').textContent = err.message || 'Invalid code.';
      $('step2Msg').style.color = '#d32f2f';
      btn.disabled = false;
      btn.textContent = 'Verify Code';
    });
  });

  $('codeInput').addEventListener('keydown', function(e) { if (e.key === 'Enter') $('step2Btn').click(); });
  $('codeInput').addEventListener('input', function() { this.value = this.value.replace(/\D/g,'').slice(0,6); });

  // Step 3: Set new password
  $('step3Btn').addEventListener('click', function() {
    var pw = $('newPwInput').value;
    var confirm = $('confirmPwInput').value;
    var code = $('codeInput').value.trim();
    if (!pw || pw.length < 6) { $('step3Msg').textContent = 'Password must be at least 6 characters.'; $('step3Msg').style.color = '#d32f2f'; return; }
    if (pw !== confirm) { $('step3Msg').textContent = 'Passwords do not match.'; $('step3Msg').style.color = '#d32f2f'; return; }
    var btn = this;
    btn.disabled = true;
    btn.textContent = 'Setting...';
    $('step3Msg').textContent = '';
    fetch('/api/complete-password-reset', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: currentUser, code: code, password: pw })
    }).then(function(r) {
      if (!r.ok) return r.json().then(function(d) { throw new Error(d.error || 'Reset failed'); });
      return r.json();
    }).then(function(d) {
      if (d.success) {
        $('step3Msg').textContent = 'Password reset! Redirecting to login...';
        $('step3Msg').style.color = '#16a34a';
        btn.textContent = 'Done';
        setTimeout(function() { window.location.href = 'admin.html'; }, 2000);
      }
    }).catch(function(err) {
      $('step3Msg').textContent = err.message || 'Failed to reset password.';
      $('step3Msg').style.color = '#d32f2f';
      btn.disabled = false;
      btn.textContent = 'Set Password';
    });
  });

  $('newPwInput').addEventListener('keydown', function(e) { if (e.key === 'Enter') $('step3Btn').click(); });
  $('confirmPwInput').addEventListener('keydown', function(e) { if (e.key === 'Enter') $('step3Btn').click(); });

  function resetFlow() {
    currentUser = '';
    $('step2').style.display = 'none';
    $('step3').style.display = 'none';
    $('step1').style.display = 'block';
    $('resetUserInput').value = '';
    $('codeInput').value = '';
    $('newPwInput').value = '';
    $('confirmPwInput').value = '';
    $('step1Msg').textContent = '';
    $('step2Msg').textContent = '';
    $('step3Msg').textContent = '';
  }
</script>
<script defer src="js/chat-widget.js"></script>

</body>
</html>
