name: Security Scan
on: [push, pull_request]

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Syntax check server
        run: node --check server/index.js && node --check server/content-api.js && node --check server/pdf-service.js

      - name: Syntax check JS files
        run: for f in js/*.js; do node --check "$f" || exit 1; done

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL
          skip-dirs: node_modules,.git,ROYAL\ PICS,uploads
